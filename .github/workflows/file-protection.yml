name: 🛡️ File Protection Check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  check-protected-files:
    runs-on: ubuntu-latest
    name: Protected Files Validation

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for protected file modifications
        run: |
          echo "🛡️ Checking for protected file modifications..."

          # Define protected file patterns
          PROTECTED_PATTERNS="^(backend/src/modules/module5/|backend/src/modules/module7/7\.4-resilience-framework/|frontend/src/components/constraint-feedback\.tsx)"

          # Get changed files (PR or push)
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
            echo "📋 Checking PR changes against base branch: ${{ github.base_ref }}"
          else
            CHANGED_FILES=$(git diff --name-only HEAD~1...HEAD)
            echo "📋 Checking push changes"
          fi

          echo "Changed files:"
          echo "$CHANGED_FILES"
          echo ""

          # Check for protected file changes
          PROTECTED_CHANGES=$(echo "$CHANGED_FILES" | grep -E "$PROTECTED_PATTERNS" || true)

          if [ -n "$PROTECTED_CHANGES" ]; then
            echo "❌ PROTECTED FILES MODIFIED:"
            echo "$PROTECTED_CHANGES"
            echo ""
            echo "🔒 These files contain working, tested code and require special handling:"
            echo "   • Module 5: Complete CPM engine (performance tested)"
            echo "   • Module 7.4: Risk Manager (7/7 tests passing)"
            echo "   • constraint-feedback.tsx: Working UI component"
            echo ""
            echo "📋 Required actions for protected file changes:"
            echo "1. Add 'protected-files' label to this PR"
            echo "2. Get architect/lead developer approval"
            echo "3. Run full test suite before merging"
            echo "4. Update protection documentation if structure changes"
            echo ""
            echo "ℹ️  To bypass this check (use sparingly):"
            echo "   Add '[bypass-protection]' to your commit message"

            # Check for bypass flag
            COMMIT_MSG=$(git log -1 --pretty=%B)
            if echo "$COMMIT_MSG" | grep -q "\[bypass-protection\]"; then
              echo ""
              echo "⚠️  BYPASS FLAG DETECTED - allowing protected file changes"
              echo "🔍 Manual review required for this PR"
            else
              exit 1
            fi
          else
            echo "✅ No protected files modified"
          fi

      - name: Validate protected files integrity
        if: success()
        run: |
          echo "🔍 Validating protected files integrity..."

          # Check that critical files still exist and have content
          CRITICAL_FILES=(
            "backend/src/modules/module5/module5.1-core-engine/schedule-math.ts"
            "backend/src/modules/module5/module5.2-forward-pass"
            "backend/src/modules/module5/module5.3-backward-pass"
            "backend/src/modules/module5/module5.4-float-critical"
            "backend/src/modules/module7/7.4-resilience-framework/resilience-framework.ts"
            "frontend/src/components/constraint-feedback.tsx"
          )

          MISSING_FILES=()
          for file in "${CRITICAL_FILES[@]}"; do
            if [ ! -e "$file" ]; then
              MISSING_FILES+=("$file")
            fi
          done

          if [ ${#MISSING_FILES[@]} -ne 0 ]; then
            echo "❌ CRITICAL FILES MISSING:"
            printf '%s\n' "${MISSING_FILES[@]}"
            echo ""
            echo "This suggests protected files may have been moved or deleted."
            echo "Manual review required."
            exit 1
          fi

          echo "✅ All critical files present"

  # Optional: Run quick tests on protected modules if they were modified
  test-protected-modules:
    runs-on: ubuntu-latest
    name: Test Protected Modules
    if: contains(github.event.head_commit.message, '[test-protected]') || github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        run: |
          cd backend
          npm ci

      - name: Run Module 5 tests
        run: |
          cd backend
          if npm run test:module5 2>/dev/null; then
            echo "✅ Module 5 tests passed"
          else
            echo "⚠️  Module 5 tests not available or failed"
          fi

      - name: Run Module 7.4 tests
        run: |
          cd backend
          if npm run test:module7 2>/dev/null; then
            echo "✅ Module 7.4 tests passed"
          else
            echo "⚠️  Module 7.4 tests not available or failed"
          fi

      - name: Run performance tests (if available)
        run: |
          cd backend
          if npm run test:perf 2>/dev/null; then
            echo "✅ Performance tests passed"
          else
            echo "⚠️  Performance tests not available or failed"
          fi
