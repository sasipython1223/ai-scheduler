name: Roadmap Status & Validation
on:
  push:
    branches: [main, develop, feature/7.*]
  pull_request:
  schedule:
    - cron: "0 6 * * *" # Daily at 6 AM UTC
  workflow_dispatch: # manual trigger

jobs:
  roadmap-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Validate roadmap and generate status
        run: |
          node scripts/check-roadmap.mjs --write || echo "Validation reported issues"

      - name: Run tests and generate reports
        run: |
          npm run report:tests || echo "Some tests failed, continuing..."
          npm run report:roadmap || echo "Roadmap update failed, continuing..."

      - name: Run Module 7.4 specific tests
        run: |
          npm test -- --testPathPattern='7.4.*test' --reporter=verbose || echo "Module 7.4 tests had issues"

      - name: Update status timestamp
        run: |
          date_str=$(date -u '+%B %d, %Y %H:%M UTC')
          sed -i "s/\*\*Updated:\*\* .*/\*\*Updated:\*\* $date_str/" docs/status.md || echo "Timestamp update failed"

      - name: Commit and push updates
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"

          if [[ -n "$(git status --porcelain docs/)" ]]; then
            git add docs/ROADMAP.md docs/status.md tmp/jest.json
            git commit -m "chore(docs): auto-update roadmap and status dashboard
            
            - Updated test results and roadmap checkboxes
            - Refreshed status timestamps
            - Generated by GitHub Actions on $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
            git push
            echo "📊 Status dashboard updated and pushed"
          else
            echo "ℹ️ No changes to commit"
          fi
